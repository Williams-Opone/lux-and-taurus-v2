    <!-- Fixed 1024px layout on ALL devices: identical desktop structure
         everywhere. Phones additionally get the .boost class (set below),
         which enlarges reading text + thickens the root link WITHOUT
         changing the layout structure. -->
    <meta name="viewport" content="width=1024" />
    <script>
      (function () {
        /* portrait width classifies the DEVICE (phone stays phone in
           landscape). Runs before first paint — no flash. */
        if (Math.min(screen.width, screen.height) < 768) {
          document.documentElement.classList.add('boost');
        }
      })();
    </script>
